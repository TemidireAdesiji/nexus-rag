name: NexusRAG CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter on gateway
        run: ruff check services/gateway/

      - name: Run ruff formatter check on gateway
        run: ruff format --check services/gateway/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install data-api dependencies
        run: npm ci
        working-directory: services/data-api

      - name: Run ESLint on data-api
        run: npx eslint src/
        working-directory: services/data-api

      - name: Run Prettier check on data-api
        run: npx prettier --check "src/**/*.ts"
        working-directory: services/data-api

      - name: Install UI dependencies
        run: npm ci
        working-directory: services/ui

      - name: Run ESLint on UI
        run: npx eslint src/
        working-directory: services/ui

      - name: Run Prettier check on UI
        run: npx prettier --check "src/**/*.{ts,tsx}"
        working-directory: services/ui

  gateway-tests:
    name: Gateway Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install ".[dev]"
        working-directory: services/gateway

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=gateway \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=results.xml
        working-directory: services/gateway

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gateway-coverage
          path: services/gateway/coverage.xml
          retention-days: 7

  data-api-tests:
    name: Data API Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/data-api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/data-api

      - name: Run vitest
        run: npx vitest run --coverage --reporter=verbose
        working-directory: services/data-api

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-api-coverage
          path: services/data-api/coverage/
          retention-days: 7

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/ui

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: services/ui

      - name: Build with Vite
        run: npx vite build
        working-directory: services/ui

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: services/ui/dist/
          retention-days: 3

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [gateway-tests, data-api-tests, ui-build]
    strategy:
      matrix:
        service: [gateway, data-api, ui]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/nexus-rag-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-format, gateway-tests, data-api-tests, ui-build, docker-build]
    steps:
      - name: Aggregate results
        run: |
          echo "## NexusRAG CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint-and-format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway Tests | ${{ needs.gateway-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data API Tests | ${{ needs.data-api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Build | ${{ needs.ui-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
