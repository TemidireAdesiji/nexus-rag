version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(gateway)"

  - package-ecosystem: "npm"
    directory: "/services/data-api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "node"
    commit-message:
      prefix: "deps(data-api)"

  - package-ecosystem: "npm"
    directory: "/services/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "node"
    commit-message:
      prefix: "deps(ui)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"
