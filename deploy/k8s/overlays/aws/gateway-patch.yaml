apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-gateway
  namespace: nexus-rag
spec:
  template:
    spec:
      containers:
        - name: gateway
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "rag"
          effect: "NoSchedule"
