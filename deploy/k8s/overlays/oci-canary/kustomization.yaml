apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus-rag

resources:
  - ../../base
  - gateway-rollout.yaml
  - data-api-rollout.yaml

patches:
  - target:
      kind: Deployment
      name: nexus-gateway
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nexus-gateway
  - target:
      kind: Deployment
      name: nexus-data-api
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nexus-data-api
  - target:
      kind: HorizontalPodAutoscaler
      name: nexus-gateway-hpa
    patch: |
      - op: replace
        path: /spec/scaleTargetRef/apiVersion
        value: argoproj.io/v1alpha1
      - op: replace
        path: /spec/scaleTargetRef/kind
        value: Rollout
  - target:
      kind: HorizontalPodAutoscaler
      name: nexus-data-api-hpa
    patch: |
      - op: replace
        path: /spec/scaleTargetRef/apiVersion
        value: argoproj.io/v1alpha1
      - op: replace
        path: /spec/scaleTargetRef/kind
        value: Rollout

images:
  - name: ghcr.io/OWNER/nexus-rag-gateway
    newName: ghcr.io/OWNER/nexus-rag-gateway
    newTag: latest
  - name: ghcr.io/OWNER/nexus-rag-data-api
    newName: ghcr.io/OWNER/nexus-rag-data-api
    newTag: latest
  - name: ghcr.io/OWNER/nexus-rag-ui
    newName: ghcr.io/OWNER/nexus-rag-ui
    newTag: latest

configMapGenerator:
  - name: nexus-rag-config
    behavior: merge
    literals:
      - CLOUD_PROVIDER=oci
      - DEPLOY_STRATEGY=canary
