apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-gateway
  namespace: nexus-rag
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: rag-engine
    app.kubernetes.io/part-of: nexus-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: rag-engine
        app.kubernetes.io/part-of: nexus-rag
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ghcr.io/OWNER/nexus-rag-gateway:latest
          ports:
            - containerPort: 5000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: nexus-rag-config
            - secretRef:
                name: nexus-rag-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_data
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: nexus-chroma-pvc
