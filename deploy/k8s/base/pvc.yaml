apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-mongo-pvc
  namespace: nexus-rag
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: nexus-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-chroma-pvc
  namespace: nexus-rag
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: vector-store
    app.kubernetes.io/part-of: nexus-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
