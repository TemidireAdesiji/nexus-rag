apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-ui
  namespace: nexus-rag
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: nexus-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: nexus-rag
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: ui
          image: ghcr.io/OWNER/nexus-rag-ui:latest
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
