apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-rag-config
  namespace: nexus-rag
  labels:
    app.kubernetes.io/part-of: nexus-rag
data:
  GATEWAY_PORT: "5000"
  DATA_API_PORT: "3456"
  UI_PORT: "80"
  NODE_ENV: "production"
  PYTHONUNBUFFERED: "1"
  DATA_API_URL: "http://nexus-data-api:3456"
  REDIS_URL: "redis://nexus-redis:6379"
  MONGODB_HOST: "nexus-mongodb"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "nexus_rag"
  CHROMA_PERSIST_DIR: "/app/chroma_data"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "*"
