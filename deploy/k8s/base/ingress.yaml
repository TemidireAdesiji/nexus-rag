apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-rag-ingress
  namespace: nexus-rag
  labels:
    app.kubernetes.io/part-of: nexus-rag
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexus-rag.example.com
      secretName: nexus-rag-tls
  rules:
    - host: nexus-rag.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nexus-gateway
                port:
                  number: 5000
          - path: /alive
            pathType: Exact
            backend:
              service:
                name: nexus-gateway
                port:
                  number: 5000
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: nexus-gateway
                port:
                  number: 5000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nexus-gateway
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-ui
                port:
                  number: 80
